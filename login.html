<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PadelNow | Login</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="header">
    <div class="logo-container">
      <img src="img/Logo.png" alt="Logo de PadelNow">
      <div class="brand-text">
        <h1>PadelNow</h1>
        <p class="subtitle">Iniciar sesión</p>
      </div>
    </div>
  </header>

  <main class="main-login">
    <section class="login-container">
      
      <div class="message">
        <p>Inicia sesión para gestionar tus reservas</p>
      </div>
      <div class="message error-message">
        <p>Correo o contraseña incorrectos</p>
      </div>
      
      <form id="loginForm" action="profile.html" method="get">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tuemail@ejemplo.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="********"
            required
          >
        </div>

        <button type="submit" class="btn">Entrar</button>
      </form>

      <p class="link-text">
        ¿No tienes cuenta? <a href="register.html">Regístrate</a>
      </p>
    </section>
  </main>
</body>
</html>
